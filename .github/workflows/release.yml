name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build Chrome
        run: pnpm build
        env:
          VITE_VERSION: ${{ github.ref_name }}

      - name: Build Firefox
        run: pnpm build:firefox
        env:
          VITE_VERSION: ${{ github.ref_name }}

      - name: Package Chrome extension
        run: |
          cd dist
          zip -r ../clearpath-chrome-${{ github.ref_name }}.zip .

      - name: Package Firefox extension
        run: |
          cd dist-firefox
          zip -r ../clearpath-firefox-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clearpath-chrome-${{ github.ref_name }}.zip
            clearpath-firefox-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false

      - name: Publish to Chrome Web Store
        uses: trmcnvn/chrome-addon@v2
        with:
          extension: ${{ secrets.CHROME_EXTENSION_ID }}
          zip: clearpath-chrome-${{ github.ref_name }}.zip
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Install web-ext
        run: pnpm add -g web-ext

      - name: Sign & Submit Firefox extension
        run: |
          web-ext sign \
            --source-dir ./dist-firefox \
            --api-key ${{ secrets.FIREFOX_API_KEY }} \
            --api-secret ${{ secrets.FIREFOX_API_SECRET }} \
            --channel listed
